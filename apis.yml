aid: podbean-api
name: Podbean API
description: >-
  This is for third-party apps to connect to Podbean in order to manage a user's
  podcast. To manage your own podcast via API, please use Client Credentials and
  Get Multiple Podcasts Tokens. The Podbean API supports OAuth 2.0 authentication
  and provides programmatic access to podcasts, episodes, analytics, and account
  management resources.
type: Index
position: Consumer
